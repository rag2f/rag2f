name: Release from Tags

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag commit is on main
        run: |
          echo "::group::Checking if tag commit is on main"

          # Ensure we have main history
          git fetch origin main:refs/remotes/origin/main --depth=200

          TAG_COMMIT=$(git rev-parse "${GITHUB_SHA}")
          if git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "✅ Tag commit $TAG_COMMIT is on main"
          else
            echo "❌ ERROR: Il tag non punta a un commit presente su main. Release bloccata."
            exit 1
          fi

          echo "::endgroup::"

      - name: Determine release type
        id: release_type
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

          if [[ "$TAG_NAME" =~ (rc|a|b)[0-9]+$ ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "Release type: Pre-release (RC/alpha/beta)"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "Release type: Stable release"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build "setuptools-scm[toml]>=8.0" wheel

      - name: Validate src/ structure
        run: |
          echo "::group::Validating src/ directory structure"

          if [ ! -d "src" ]; then
            echo "❌ ERROR: /src directory not found!"
            exit 1
          fi
          echo "✅ /src directory exists"

          package_found=false
          for dir in src/*/; do
            if [ -d "$dir" ] && [ -f "${dir}__init__.py" ]; then
              package_found=true
              echo "✅ Found package: $(basename "$dir")"
            fi
          done

          if [ -f "src/__init__.py" ]; then
            package_found=true
            echo "✅ src/ is also a package"
          fi

          if [ "$package_found" = false ]; then
            echo "❌ ERROR: No importable package found in /src"
            exit 1
          fi

          echo "::endgroup::"

      - name: Validate __init__.py presence
        run: |
          echo "::group::Validating __init__.py in all packages"

          missing_init=()
          while IFS= read -r -d '' dir; do
            if [ ! -f "$dir/__init__.py" ]; then
              missing_init+=("$dir")
            fi
          done < <(find src -type d -exec sh -c '[ -n "$(find "$1" -maxdepth 1 -name "*.py" -print -quit)" ]' _ {} \; -print0)

          if [ ${#missing_init[@]} -gt 0 ]; then
            echo "❌ ERROR: The following package directories are missing __init__.py:"
            printf '%s\n' "${missing_init[@]}"
            exit 1
          fi

          echo "✅ All package directories have __init__.py"
          echo "::endgroup::"

      - name: Validate pyproject.toml configuration
        run: |
          echo "::group::Validating pyproject.toml"

          if ! grep -q 'dynamic.*=.*\[.*"version".*\]' pyproject.toml; then
            echo "❌ ERROR: pyproject.toml must have dynamic = [\"version\"]"
            exit 1
          fi

          if ! grep -q 'setuptools-scm' pyproject.toml; then
            echo "❌ ERROR: setuptools-scm not found in build-system.requires"
            exit 1
          fi

          if ! grep -q 'local_scheme.*=.*"no-local-version"' pyproject.toml; then
            echo "❌ ERROR: [tool.setuptools_scm].local_scheme must be \"no-local-version\""
            exit 1
          fi

          echo "✅ pyproject.toml checks OK"
          echo "::endgroup::"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ steps.release_type.outputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+((rc|a|b)[0-9]+)?$ ]]; then
            echo "❌ ERROR: Tag must be vX.Y.Z or vX.Y.ZrcN (PEP 440). Found: $TAG"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Build package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_RAG2F: ${{ steps.version.outputs.version }}
        run: |
          echo "Building release version: ${{ steps.version.outputs.version }}"
          rm -rf dist build *.egg-info src/*.egg-info src/**/_version.py
          python -m build --wheel --no-isolation

      - name: Verify build contents
        run: |
          echo "::group::Build artifacts"
          ls -lh dist/

          WHEEL_FILE=$(ls dist/*.whl | head -1)
          echo "Wheel: $WHEEL_FILE"

          if python -m zipfile -l "$WHEEL_FILE" | grep -E '^(plugins/|tests/|test/|temp/|scripts/)' -q; then
            echo "❌ ERROR: Wheel includes files outside src/ (plugins/tests/temp/scripts detected)"
            python -m zipfile -l "$WHEEL_FILE" | grep -E 'plugins/|tests/|test/|temp/|scripts/' || true
            exit 1
          fi

          if ! python -m zipfile -l "$WHEEL_FILE" | grep -q 'rag2f/__init__.py'; then
            echo "❌ ERROR: rag2f package not found in wheel"
            exit 1
          fi

          echo "✅ Build contents OK"
          echo "::endgroup::"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ steps.release_type.outputs.tag }}
          tag_name: ${{ steps.release_type.outputs.tag }}
          prerelease: ${{ steps.release_type.outputs.is_prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test - Install and verify
        run: |
          echo "::group::Smoke test - installing from PyPI"

          python -m pip install --upgrade pip
          python -m pip install --no-deps "rag2f==${{ steps.version.outputs.version }}"

          python - << 'PY'
          import rag2f
          print('Imported rag2f')
          print('Version:', getattr(rag2f, '__version__', None))
          print('Commit:', getattr(rag2f, '__commit__', None))
          PY

          echo "::endgroup::"
