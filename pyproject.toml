[build-system]
requires = ["setuptools>=61.0", "wheel", "setuptools-scm[toml]>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "rag2f"
dynamic = ["version"]
description = "RAG2F - Retrieval Augmented Generation Framework"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "GPL-3.0"}
authors = [
    {name = "Dario Chini", email = "dariochini@gmail.com"}
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "inflection",
    "python-dotenv",
    "pydantic",
    "packaging",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "rich",
    "pytest-rich",
    "pytest-icdiff",
    "pytest-clarity",
    "pytest-instafail",
    "coverage",
    "pytest-cov",
    "respx",
    "fakeredis",
]
rag2f-openai-embedder = ["rag2f-openai-embedder>=0.1.0.dev5"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools_scm]
local_scheme = "no-local-version"
write_to = "src/rag2f/_version.py"
write_to_template = '''
# coding: utf-8
# file generated by setuptools_scm
# don't change, don't track in version control
TYPE_CHECKING = False
if TYPE_CHECKING:
    from typing import Tuple
    VERSION_TUPLE = Tuple[int, ...]
else:
    VERSION_TUPLE = object

__all__ = ["__version__", "__version_tuple__", "__commit__", "__distance__", "__dirty__"]

__version__: str
__version_tuple__: VERSION_TUPLE
__commit__: str
__distance__: int
__dirty__: bool

__version__ = version = {version!r}
__version_tuple__ = version_tuple = {version_tuple!r}
__commit__ = {scm_version.node!r}
__distance__ = {scm_version.distance}
__dirty__ = {scm_version.dirty!r}
'''

[tool.pytest.ini_options]
testpaths = ["tests","plugins"]
pythonpath = ["src"]
addopts = "-s -vv -rA --color=yes --maxfail=3"
python_files = "test_*.py"
python_functions = "test_*"
